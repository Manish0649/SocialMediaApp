<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            height:80vh;
            display:flex;
            justify-content: center;
            align-items: center;
        }
        </style>
</head>
<body>
    <div class="container">
        <input id="nameInput" type="text" placeholder="Enter your message">
        <button onclick="handleSubmit()">Submit</button>
    </div>
    <script>
        let inputTag=document.getElementById("nameInput");
        console.log(inputTag.value);

        function handleSubmit(){
            let username=inputTag.value;
            console.log(username);
            localStorage.setItem("g6Socket",username);
            window.location="chat.html";
        }
    </script>
</body>
</html>
